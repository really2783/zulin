<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>净水器租赁维保管理系统</title>
    <style>
        :root {
            --primary-color: #007AFF; /* 模仿水精灵蓝 */
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-sub: #888888;
            --danger: #FF3B30;
            --warning: #FF9500;
            --success: #34C759;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 80px; }

        /* 头部 */
        .header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 待办区域 */
        .todo-section {
            padding: 10px 15px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .todo-title { font-size: 14px; color: var(--text-sub); margin-bottom: 5px; }
        .todo-item { color: var(--danger); font-size: 14px; font-weight: bold; margin: 5px 0; display: flex; align-items: center; }
        .todo-item::before { content: '!'; color: white; background: var(--danger); width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 12px; margin-right: 8px; }

        /* 设备列表 */
        .device-list { padding: 15px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
        }
        
        /* 状态样式 */
        .status-normal { border-left-color: var(--success); }
        .status-warning { border-left-color: var(--warning); }
        .status-danger { border-left-color: var(--danger); background-color: #FFF9F9; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 18px; font-weight: bold; }
        .card-id { font-size: 12px; background: #eee; padding: 2px 6px; border-radius: 4px; color: #666; }
        
        .info-row { display: flex; margin-bottom: 6px; font-size: 14px; color: #555; }
        .info-label { width: 70px; color: var(--text-sub); }
        
        .date-box { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; }
        .date-item { text-align: center; flex: 1; }
        .date-label { font-size: 12px; color: var(--text-sub); display: block; margin-bottom: 4px; }
        .date-val { font-size: 15px; font-weight: bold; }

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-service { background: #E3F2FD; color: var(--primary-color); }
        .btn-rent { background: #E8F5E9; color: var(--success); }
        .btn-del { background: #FFEBEE; color: var(--danger); flex: 0 0 40px; }

        /* 底部添加按钮 */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,122,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 200;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            justify-content: center;
            align-items: flex-end;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-sub); font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; }
        .btn-close { margin-top: 10px; background: transparent; color: #888; }

        /* 颜色工具类 */
        .text-red { color: var(--danger); }
        .text-orange { color: var(--warning); }
    </style>
</head>
<body>

<div class="header">净水维保管理 V5.0</div>

<!-- 待办事项 -->
<div class="todo-section" id="todoSection">
    <div class="todo-title">今日待办 / 即将到期</div>
    <div id="todoList">暂无待办</div>
</div>

<!-- 设备列表 -->
<div class="device-list" id="deviceList">
    <!-- 列表由JS生成 -->
</div>

<!-- 悬浮添加按钮 -->
<div class="fab" onclick="openModal()">+</div>

<!-- 添加设备弹窗 -->
<div class="modal" id="addModal">
    <div class="modal-content">
        <h3 style="margin-top:0">新增设备台账</h3>
        <div class="form-group">
            <label>客户姓名</label>
            <input type="text" id="inName" placeholder="请输入客户姓名">
        </div>
        <div class="form-group">
            <label>联系电话</label>
            <input type="tel" id="inPhone" placeholder="请输入电话">
        </div>
        <div class="form-group">
            <label>安装地址</label>
            <input type="text" id="inAddr" placeholder="请输入详细地址">
        </div>
        <div class="form-group">
            <label>租金周期 (月)</label>
            <input type="number" id="inRentCycle" value="1" placeholder="默认1个月">
        </div>
        <button class="btn-submit" onclick="addDevice()">保存设备</button>
        <button class="btn-submit btn-close" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    // --- 核心逻辑 ---
    const DB_KEY = 'water_purifier_data_v1';
    let devices = JSON.parse(localStorage.getItem(DB_KEY)) || [];

    // 初始化日期格式
    function fmtDate(d) {
        if(!d) return '-';
        let date = new Date(d);
        return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
    }

    // 计算日期差值（天）
    function getDaysDiff(d1, d2) {
        let oneDay = 24 * 60 * 60 * 1000;
        return Math.round((new Date(d1) - new Date(d2)) / oneDay);
    }

    // 获取状态颜色
    function getStatusClass(dateStr) {
        if(!dateStr) return 'status-normal';
        let days = getDaysDiff(dateStr, new Date());
        if (days < 0) return 'status-danger'; // 过期
        if (days <= 7) return 'status-warning'; // 7天内
        return 'status-normal';
    }

    // 获取文字颜色
    function getStatusColor(dateStr) {
        if(!dateStr) return '';
        let days = getDaysDiff(dateStr, new Date());
        if (days < 0) return 'text-red';
        if (days <= 7) return 'text-orange';
        return '';
    }

    // 渲染列表
    function render() {
        const listEl = document.getElementById('deviceList');
        const todoEl = document.getElementById('todoList');
        listEl.innerHTML = '';
        todoEl.innerHTML = '';

        // 排序：过期的/快到期的在最上面
        devices.sort((a, b) => {
            let aDate = new Date(a.nextMaintain);
            let bDate = new Date(b.nextMaintain);
            return aDate - bDate;
        });

        let hasTodo = false;

        devices.forEach((dev, index) => {
            // 检查待办
            let mDays = getDaysDiff(dev.nextMaintain, new Date());
            let rDays = getDaysDiff(dev.nextRent, new Date());
            
            if (mDays <= 7 || rDays <= 7) {
                hasTodo = true;
                let txt = `${dev.name} (${dev.code})`;
                if(mDays < 0) txt += " [维保过期]";
                else if(mDays <= 7) txt += " [维保即将到期]";
                
                if(rDays < 0) txt += " [租金过期]";
                else if(rDays <= 7) txt += " [租金即将到期]";
                
                todoEl.innerHTML += `<div class="todo-item">${txt}</div>`;
            }

            // 生成卡片
            let statusClass = 'status-normal';
            // 只要有一个过期或预警，整体变色
            if (mDays < 0 || rDays < 0) statusClass = 'status-danger';
            else if (mDays <= 7 || rDays <= 7) statusClass = 'status-warning';

            let html = `
            <div class="card ${statusClass}">
                <div class="card-header">
                    <span class="card-title">${dev.name}</span>
                    <span class="card-id">${dev.code}</span>
                </div>
                <div class="info-row"><span class="info-label">电话:</span> ${dev.phone}</div>
                <div class="info-row"><span class="info-label">地址:</span> ${dev.address}</div>
                
                <div class="date-box">
                    <div class="date-item">
                        <span class="date-label">下次维保</span>
                        <span class="date-val ${getStatusColor(dev.nextMaintain)}">${fmtDate(dev.nextMaintain)}</span>
                    </div>
                    <div class="date-item">
                        <span class="date-label">下次租金</span>
                        <span class="date-val ${getStatusColor(dev.nextRent)}">${fmtDate(dev.nextRent)}</span>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-service" onclick="doMaintain(${index})">维保打卡</button>
                    <button class="btn btn-rent" onclick="doRent(${index})">收租确认</button>
                    <button class="btn btn-del" onclick="delDevice(${index})">×</button>
                </div>
            </div>
            `;
            listEl.innerHTML += html;
        });

        if (!hasTodo) todoEl.innerHTML = '<div style="color:#999; font-size:12px;">暂无即将到期的设备</div>';
        
        // 保存数据
        localStorage.setItem(DB_KEY, JSON.stringify(devices));
    }

    // --- 操作功能 ---

    // 添加设备
    function addDevice() {
        let name = document.getElementById('inName').value;
        let phone = document.getElementById('inPhone').value;
        let addr = document.getElementById('inAddr').value;
        let rentCycle = parseInt(document.getElementById('inRentCycle').value) || 1;

        if (!name || !phone) { alert('请填写姓名和电话'); return; }

        // 生成编号
        let code = 'JW-' + (1000 + devices.length + 1);
        
        // 初始日期
        let now = new Date();
        let nextM = new Date(); nextM.setMonth(now.getMonth() + 3); // 默认3个月维保
        let nextR = new Date(); nextR.setMonth(now.getMonth() + rentCycle);

        devices.push({
            code: code,
            name: name,
            phone: phone,
            address: addr,
            installDate: fmtDate(now),
            nextMaintain: fmtDate(nextM),
            rentCycle: rentCycle,
            nextRent: fmtDate(nextR)
        });

        closeModal();
        render();
    }

    // 执行维保
    function doMaintain(index) {
        let dev = devices[index];
        let baseDate = new Date(dev.nextMaintain);
        let today = new Date();
        
        // 如果已经过期，从今天开始算；如果没过期，从上次到期日往后加
        // 这里采用简单逻辑：直接+3个月
        baseDate.setMonth(baseDate.getMonth() + 3);
        
        dev.nextMaintain = fmtDate(baseDate);
        render();
    }

    // 执行收租
    function doRent(index) {
        let dev = devices[index];
        let baseDate = new Date(dev.nextRent);
        baseDate.setMonth(baseDate.getMonth() + dev.rentCycle);
        dev.nextRent = fmtDate(baseDate);
        render();
    }

    // 删除
    function delDevice(index) {
        if(confirm('确定删除该设备吗？')) {
            devices.splice(index, 1);
            render();
        }
    }

    // --- UI 交互 ---
    function openModal() { document.getElementById('addModal').classList.add('open'); }
    function closeModal() { document.getElementById('addModal').classList.remove('open'); }

    // 首次加载
    render();

</script>
</body>
</html>
</div>

<script>
let devices = JSON.parse(localStorage.getItem('devices')||'[]');

function save(){
 localStorage.setItem('devices',JSON.stringify(devices));
}

function nextDate(date, m){
 let d=new Date(date);
 d.setMonth(d.getMonth()+m);
 return d;
}

function status(date){
 let diff=(date-new Date())/86400000;
 if(diff<0) return 'red';
 if(diff<=3) return 'orange';
 return 'green';
}

function render(){
 let list='',todo='';

 devices.forEach((d,i)=>{
  let sDate=new Date(d.nextService);
  let rDate=new Date(d.nextRent);

  let s=status(sDate);
  let r=status(rDate);

  if(s!='green' || r!='green'){
    todo+=`${d.id} ${d.name}<br>`;
  }

  list+=`
  <div class="card">
    <b>${d.id} ${d.name}</b><br>
    维保：<span class="${s}">${sDate.toLocaleDateString()}</span><br>
    租金：<span class="${r}">${rDate.toLocaleDateString()}</span><br>
    <button onclick="service(${i})">完成维保</button>
    <button onclick="rent(${i})">完成收租</button>
  </div>`;
 });

 document.getElementById('list').innerHTML=list;
 document.getElementById('todo').innerHTML=todo||'无';
}

function add(){
 let name=document.getElementById('name').value;
 let phone=document.getElementById('phone').value;
 let cycle=parseInt(document.getElementById('cycle').value)||3;
 let rentCycle=parseInt(document.getElementById('rent').value)||1;

 let id='JW-'+String(devices.length+1).padStart(4,'0');
 let now=new Date();

 devices.push({
   id,name,phone,
   lastService:now,
   nextService:nextDate(now,cycle),
   nextRent:nextDate(now,rentCycle),
   cycle,rentCycle
 });

 save();render();
}

function service(i){
 let now=new Date();
 devices[i].lastService=now;
 devices[i].nextService=nextDate(now,devices[i].cycle);
 save();render();
}

function rent(i){
 let now=new Date();
 devices[i].nextRent=nextDate(now,devices[i].rentCycle);
 save();render();
}

render();
</script>

</body>
</html>
