<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水密码净水租赁管理系统</title>
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#60A5FA',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
            dark: '#1F2937',
            light: '#F3F4F6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card: '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      .status-badge {
        @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium;
      }
      .status-normal {
        @apply bg-green-100 text-green-800;
      }
      .status-warning {
        @apply bg-yellow-100 text-yellow-800;
      }
      .status-expired {
        @apply bg-red-100 text-red-800;
      }
      .fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .slide-in {
        animation: slideIn 0.3s ease-in-out;
      }
      @keyframes slideIn {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
      }
      .pulse {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
  <!-- 顶部导航栏 -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-xl font-bold text-primary flex items-center">
        <i class="fa fa-tint mr-2"></i>
        <span>水密码净水租赁管理系统</span>
      </h1>
      <div class="flex items-center space-x-4">
        <button id="syncBtn" class="text-blue-500 hover:text-blue-700" title="手动云同步">
          <i class="fa fa-refresh"></i>
        </button>
        <button id="backupBtn" class="text-gray-600 hover:text-primary" title="本地导出备份">
          <i class="fa fa-cloud-upload"></i>
        </button>
        <button id="exportBtn" class="text-gray-600 hover:text-primary" title="导出Excel">
          <i class="fa fa-download"></i>
        </button>
        <button id="settingsBtn" class="text-gray-600 hover:text-primary" title="设置">
          <i class="fa fa-cog"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="flex-grow container mx-auto px-4 pt-6 pb-24">
    <div id="pageContent" class="fade-in">
      <!-- 首页内容 -->
      <div id="homePage">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-lg shadow-card p-6 card-hover">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500 font-medium">设备总数</p>
                <h3 id="totalDevices" class="text-3xl font-bold mt-1">0</h3>
              </div>
              <div class="bg-blue-100 p-3 rounded-full">
                <i class="fa fa-microchip text-primary text-xl"></i>
              </div>
            </div>
            <div class="mt-4 text-sm text-gray-500">
              <span id="deviceTrend">+0% 较上月</span>
            </div>
          </div>
          <div class="bg-white rounded-lg shadow-card p-6 card-hover">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500 font-medium">即将到期</p>
                <h3 id="warningDevices" class="text-3xl font-bold mt-1 text-warning">0</h3>
              </div>
              <div class="bg-yellow-100 p-3 rounded-full">
                <i class="fa fa-exclamation-triangle text-warning text-xl"></i>
              </div>
            </div>
            <div class="mt-4 text-sm text-gray-500">
              <span id="warningTrend">3天内需要处理</span>
            </div>
          </div>
          <div class="bg-white rounded-lg shadow-card p-6 card-hover">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500 font-medium">已过期</p>
                <h3 id="expiredDevices" class="text-3xl font-bold mt-1 text-danger">0</h3>
              </div>
              <div class="bg-red-100 p-3 rounded-full">
                <i class="fa fa-times-circle text-danger text-xl"></i>
              </div>
            </div>
            <div class="mt-4 text-sm text-gray-500">
              <span id="expiredTrend">需要立即处理</span>
            </div>
          </div>
        </div>
        
        <!-- 今日提醒 -->
        <div class="bg-white rounded-lg shadow-card p-6 mb-8">
          <h2 class="text-lg font-semibold mb-4 flex items-center">
            <i class="fa fa-bell text-primary mr-2"></i>
            今日提醒
          </h2>
          <div id="todayReminders" class="space-y-4">
            <div class="text-center text-gray-500 py-8">
              <i class="fa fa-check-circle text-4xl mb-3 text-green-500"></i>
              <p>今日暂无待办事项</p>
            </div>
          </div>
        </div>
        
        <!-- 待办事项列表 -->
        <div class="bg-white rounded-lg shadow-card p-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold flex items-center">
              <i class="fa fa-tasks text-primary mr-2"></i>
              待办事项
            </h2>
            <div class="flex space-x-2">
              <button class="home-filter-btn active px-3 py-1 text-sm rounded-full bg-primary text-white" data-filter="all">全部</button>
              <button class="home-filter-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700" data-filter="expired">已过期</button>
              <button class="home-filter-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700" data-filter="warning">即将到期</button>
            </div>
          </div>
          <div id="todoList" class="space-y-4">
            <div class="text-center text-gray-500 py-8">
              <i class="fa fa-list-alt text-4xl mb-3 text-gray-300"></i>
              <p>暂无待办事项</p>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 设备列表页 -->
      <div id="devicesPage" class="hidden">
        <div class="bg-white rounded-lg shadow-card p-6 mb-6">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
            <h2 class="text-lg font-semibold flex items-center">
              <i class="fa fa-list text-primary mr-2"></i>
              设备列表
            </h2>
            <div class="flex flex-col md:flex-row gap-3">
              <div class="relative">
                <input type="text" id="searchInput" placeholder="搜索设备编号或客户姓名" 
                       class="w-full md:w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
              </div>
              <button id="importBtn" class="flex items-center justify-center px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                <i class="fa fa-upload mr-2"></i>
                批量导入
              </button>
              <button id="addDeviceBtn" class="flex items-center justify-center px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition">
                <i class="fa fa-plus mr-2"></i>
                新增设备
              </button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead>
                <tr>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">设备编号</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">客户姓名</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">安装地址</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">维保到期</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">租金到期</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">合同归档</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                  <th class="px-6 py-3 bg-gray-50 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
              </thead>
              <tbody id="devicesTableBody" class="bg-white divide-y divide-gray-200">
                <tr>
                  <td colspan="8" class="px-6 py-10 text-center text-gray-500">
                    <i class="fa fa-info-circle text-2xl mb-2"></i>
                    <p>暂无设备数据，请添加设备</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" class="flex justify-between items-center mt-6">
            <div class="text-sm text-gray-500">
              显示 <span id="showingRange">0-0</span> 条，共 <span id="totalItems">0</span> 条
            </div>
            <div class="flex space-x-2">
              <button id="prevPageBtn" class="px-3 py-1 border border-gray-300 rounded-md text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa fa-chevron-left"></i>
              </button>
              <button id="nextPageBtn" class="px-3 py-1 border border-gray-300 rounded-md text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 新增/编辑设备页 -->
      <div id="deviceFormPage" class="hidden">
        <div class="bg-white rounded-lg shadow-card p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 id="formTitle" class="text-lg font-semibold flex items-center">
              <i class="fa fa-plus-circle text-primary mr-2"></i>
              新增设备
            </h2>
            <button id="cancelFormBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
              取消
            </button>
          </div>
          <form id="deviceForm" class="space-y-6">
            <input type="hidden" id="deviceId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label for="deviceNumber" class="block text-sm font-medium text-gray-700 mb-1">设备编号 <span class="text-danger">*</span></label>
                <input type="text" id="deviceNumber" name="deviceNumber" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="customerName" class="block text-sm font-medium text-gray-700 mb-1">客户姓名 <span class="text-danger">*</span></label>
                <input type="text" id="customerName" name="customerName" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="contactPhone" class="block text-sm font-medium text-gray-700 mb-1">联系电话 <span class="text-danger">*</span></label>
                <input type="tel" id="contactPhone" name="contactPhone" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="machineModel" class="block text-sm font-medium text-gray-700 mb-1">机器型号 <span class="text-danger">*</span></label>
                <input type="text" id="machineModel" name="machineModel" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="installationDate" class="block text-sm font-medium text-gray-700 mb-1">安装日期 <span class="text-danger">*</span></label>
                <input type="date" id="installationDate" name="installationDate" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="firstMaintenanceDate" class="block text-sm font-medium text-gray-700 mb-1">首次维保完成日期 <span class="text-danger">*</span></label>
                <input type="date" id="firstMaintenanceDate" name="firstMaintenanceDate" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="rentalPaymentCycle" class="block text-sm font-medium text-gray-700 mb-1">租金缴纳周期 <span class="text-danger">*</span></label>
                <select id="rentalPaymentCycle" name="rentalPaymentCycle" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                  <option value="1">1个月</option>
                  <option value="3">3个月</option>
                  <option value="6">6个月</option>
                  <option value="12">12个月</option>
                </select>
              </div>
              <div>
                <label for="nextRentalDueDate" class="block text-sm font-medium text-gray-700 mb-1">租金下次到期日 <span class="text-danger">*</span></label>
                <input type="date" id="nextRentalDueDate" name="nextRentalDueDate" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
              </div>
              <div>
                <label for="maintenanceCycle" class="block text-sm font-medium text-gray-700 mb-1">维保周期 <span class="text-danger">*</span></label>
                <select id="maintenanceCycle" name="maintenanceCycle" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                  <option value="1">1个月</option>
                  <option value="2">2个月</option>
                  <option value="3" selected>3个月</option>
                  <option value="6">6个月</option>
                </select>
              </div>
              <div>
                <label for="nextMaintenanceDate" class="block text-sm font-medium text-gray-700 mb-1">下次维保日期</label>
                <input type="date" id="nextMaintenanceDate" name="nextMaintenanceDate" readonly
                       class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
              </div>
            </div>
            <div>
              <label for="installationAddress" class="block text-sm font-medium text-gray-700 mb-1">安装详细地址 <span class="text-danger">*</span></label>
              <textarea id="installationAddress" name="installationAddress" rows="2" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
            </div>
            <div>
              <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">备注</label>
              <textarea id="notes" name="notes" rows="3"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
            </div>
            <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
              <button type="button" id="resetFormBtn" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                重置
              </button>
              <button type="submit" id="saveDeviceBtn" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition">
                保存
              </button>
            </div>
          </form>
        </div>
      </div>
      
      <!-- 历史记录页 -->
      <div id="historyPage" class="hidden">
        <div class="bg-white rounded-lg shadow-card p-6 mb-6">
          <h2 class="text-lg font-semibold mb-4 flex items-center">
            <i class="fa fa-history text-primary mr-2"></i>
            历史记录
          </h2>
          <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="flex-1">
              <label for="historyDeviceFilter" class="block text-sm font-medium text-gray-700 mb-1">选择设备</label>
              <select id="historyDeviceFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                <option value="all">全部设备</option>
              </select>
            </div>
            <div class="flex-1">
              <label for="historyTypeFilter" class="block text-sm font-medium text-gray-700 mb-1">记录类型</label>
              <select id="historyTypeFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                <option value="all">全部记录</option>
                <option value="maintenance">维保记录</option>
                <option value="payment">缴费记录</option>
              </select>
            </div>
            <div class="flex-1">
              <label for="historyDateRange" class="block text-sm font-medium text-gray-700 mb-1">日期范围</label>
              <select id="historyDateRange" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                <option value="7">最近7天</option>
                <option value="30" selected>最近30天</option>
                <option value="90">最近90天</option>
                <option value="365">最近一年</option>
                <option value="all">全部时间</option>
              </select>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead>
                <tr>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">设备编号</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">客户姓名</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">记录类型</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">详情</th>
                  <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作人</th>
                  <th class="px-6 py-3 bg-gray-50 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
              </thead>
              <tbody id="historyTableBody" class="bg-white divide-y divide-gray-200">
                <tr>
                  <td colspan="7" class="px-6 py-10 text-center text-gray-500">
                    <i class="fa fa-history text-2xl mb-2"></i>
                    <p>暂无历史记录</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="historyPagination" class="flex justify-between items-center mt-6">
            <div class="text-sm text-gray-500">
              显示 <span id="historyShowingRange">0-0</span> 条，共 <span id="historyTotalItems">0</span> 条
            </div>
            <div class="flex space-x-2">
              <button id="historyPrevPageBtn" class="px-3 py-1 border border-gray-300 rounded-md text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa fa-chevron-left"></i>
              </button>
              <button id="historyNextPageBtn" class="px-3 py-1 border border-gray-300 rounded-md text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 设备详情页 -->
      <div id="deviceDetailPage" class="hidden">
        <div class="bg-white rounded-lg shadow-card p-6 mb-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-semibold flex items-center">
              <i class="fa fa-info-circle text-primary mr-2"></i>
              设备详情
            </h2>
            <button id="backToListBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
              返回列表
            </button>
          </div>
          <div id="deviceDetailContent"></div>
          <div class="mt-8">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-md font-semibold">维保记录</h3>
              <button id="addMaintenanceBtn" class="px-4 py-1 bg-primary text-white text-sm rounded-lg hover:bg-blue-600 transition">
                添加维保记录
              </button>
            </div>
            <div id="maintenanceRecordsList" class="space-y-3">
              <div class="text-center text-gray-500 py-6">
                <p>暂无维保记录</p>
              </div>
            </div>
          </div>
          <div class="mt-8">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-md font-semibold">缴费记录</h3>
              <button id="addPaymentBtn" class="px-4 py-1 bg-primary text-white text-sm rounded-lg hover:bg-blue-600 transition">
                添加缴费记录
              </button>
            </div>
            <div id="paymentRecordsList" class="space-y-3">

  <!-- JavaScript -->
  <script>
    // Supabase 配置
    const supabaseUrl = 'https://pypmcaslxkysuihhxonn.supabase.co';
    const supabaseKey = 'sb_publishable_GRQe3WYCOFAJWSfXhQ5eUQ_hpZyixk5';
    let supabaseClient = null;
    try {
      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    } catch(e) {
      console.error("Supabase 初始化失败", e);
    }

    // 全局变量
    const STORAGE_KEY = 'waterPurifierSystem';
    let devices = [];
    let currentPage = 'homePage';
    let currentDeviceId = null;
    let homeFilter = 'all';
    let currentPageNum = 1;
    let itemsPerPage = 10;
    let filteredDevices = [];
    let historyRecords = [];
    let currentHistoryPage = 1;
    let itemsPerHistoryPage = 10;
    
    // 安全的月份加法（修复月末溢出）
    function addMonthsSafely(date, months) {
      const d = new Date(date);
      const day = d.getDate();
      d.setMonth(d.getMonth() + months);
      if (d.getDate() !== day) d.setDate(0);
      return d;
    }

    // 重新计算维保到期日
    function recalculateNextMaintenanceDate(device) {
      if (device.maintenanceRecords && device.maintenanceRecords.length > 0) {
        const latest = [...device.maintenanceRecords].sort((a,b) => b.maintenanceDate - a.maintenanceDate)[0];
        device.nextMaintenanceDate = addMonthsSafely(latest.maintenanceDate, device.maintenanceCycle);
      } else {
        device.nextMaintenanceDate = addMonthsSafely(device.firstMaintenanceDate, device.maintenanceCycle);
      }
    }

    // 重新计算租金到期日
    function recalculateNextRentalDueDate(device) {
      if (device.paymentRecords && device.paymentRecords.length > 0) {
        const latest = [...device.paymentRecords].sort((a,b) => b.paymentDate - a.paymentDate)[0];
        device.nextRentalDueDate = addMonthsSafely(latest.paymentDate, device.rentalPaymentCycle);
      } else {
        device.nextRentalDueDate = addMonthsSafely(device.installationDate, device.rentalPaymentCycle);
      }
    }

    // 初始化应用
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      initUI();
      bindEvents();
      showPage('homePage');
      checkTodayReminders();
      autoLoadFromCloud();
    });

    // 辅助函数：统一处理设备列表里的日期字符串转 Date 对象
    function parseDeviceDates(deviceList) {
      deviceList.forEach(device => {
        device.installationDate = new Date(device.installationDate);
        device.firstMaintenanceDate = new Date(device.firstMaintenanceDate);
        device.nextRentalDueDate = new Date(device.nextRentalDueDate);
        device.nextMaintenanceDate = new Date(device.nextMaintenanceDate);
        device.createdAt = new Date(device.createdAt);
        device.updatedAt = new Date(device.updatedAt);
        
        if (device.contractArchived === undefined) {
          device.contractArchived = false;
        }

        if (device.maintenanceRecords) {
          device.maintenanceRecords.forEach(record => {
            record.maintenanceDate = new Date(record.maintenanceDate);
            record.createdAt = new Date(record.createdAt);
            if (!record.id) record.id = generateId();
          });
        }
        
        if (device.paymentRecords) {
          device.paymentRecords.forEach(record => {
            record.paymentDate = new Date(record.paymentDate);
            record.createdAt = new Date(record.createdAt);
            if (!record.id) record.id = generateId();
          });
        }
      });
    }
    
    // 从本地存储加载数据
    function loadData() {
      const storedData = localStorage.getItem(STORAGE_KEY);
      if (storedData) {
        try {
          const parsedData = JSON.parse(storedData);
          devices = parsedData.devices || [];
          parseDeviceDates(devices);
          updateDevicesStatus();
        } catch (error) {
          console.error('加载本地数据失败:', error);
          devices = [];
        }
      }
    }
    
    // 自动在后台同步数据到云端
    async function autoSyncToCloud() {
      if (!supabaseClient) return;
      const syncBtn = document.getElementById('syncBtn');
      syncBtn.innerHTML = '<i class="fa fa-refresh fa-spin text-green-500"></i>';
      try {
        const dataToSave = { devices: devices, lastUpdated: new Date().toISOString() };
        const { error } = await supabaseClient
          .from('cloud_sync')
          .upsert({ id: 'main_data', data: dataToSave, updated_at: new Date().toISOString() });
        if (error) throw error;
        console.log('自动同步云端成功');
        syncBtn.innerHTML = '<i class="fa fa-check text-green-500"></i>';
        setTimeout(() => { syncBtn.innerHTML = '<i class="fa fa-refresh"></i>'; }, 2000);
      } catch (err) {
        console.error('自动同步云端失败:', err);
        syncBtn.innerHTML = '<i class="fa fa-exclamation-triangle text-red-500" title="自动同步失败"></i>';
        setTimeout(() => { syncBtn.innerHTML = '<i class="fa fa-refresh"></i>'; }, 3000);
      }
    }

    // 启动时自动从云端拉取数据
    async function autoLoadFromCloud() {
      if (!supabaseClient) return;
      const syncBtn = document.getElementById('syncBtn');
      syncBtn.innerHTML = '<i class="fa fa-refresh fa-spin text-blue-500"></i>';
      try {
        const { data, error } = await supabaseClient
          .from('cloud_sync')
          .select('data')
          .eq('id', 'main_data')
          .single();
        if (error) {
          if (error.code === 'PGRST116') {
            syncBtn.innerHTML = '<i class="fa fa-refresh"></i>';
            return;
          }
          throw error;
        }
        if (data && data.data && data.data.devices) {
          devices = data.data.devices;
          parseDeviceDates(devices);
          updateDevicesStatus();
          saveData(true);
          updateDeviceStats();
          if(currentPage === 'devicesPage') renderDevicesList();
          if(currentPage === 'homePage') { renderTodayReminders(); renderTodoList(); }
          if(currentPage === 'historyPage') renderHistoryFilters();
          syncBtn.innerHTML = '<i class="fa fa-check text-green-500" title="已拉取最新"></i>';
          setTimeout(() => { syncBtn.innerHTML = '<i class="fa fa-refresh"></i>'; }, 2000);
        }
      } catch (err) {
        console.error('自动拉取云端数据失败:', err);
        syncBtn.innerHTML = '<i class="fa fa-exclamation-triangle text-red-500" title="自动拉取失败"></i>';
        setTimeout(() => { syncBtn.innerHTML = '<i class="fa fa-refresh"></i>'; }, 3000);
      }
    }

    // 保存数据到本地存储
    function saveData(skipCloudSync = false) {
      try {
        const dataToSave = { devices: devices, lastUpdated: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
        if (!skipCloudSync) autoSyncToCloud();
        return true;
      } catch (error) {
        console.error('保存本地数据失败:', error);
        return false;
      }
    }
    
    // 初始化UI
    function initUI() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('installationDate').value = today;
      document.getElementById('firstMaintenanceDate').value = today;
      calculateNextMaintenanceDate();
      updateDeviceStats();
      renderDevicesList();
      renderHistoryFilters();
    }
    
    // 绑定事件
    function bindEvents() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.getAttribute('data-page');
          showPage(page);
          if (page === 'deviceFormPage') {
            resetDeviceForm();
            document.getElementById('formTitle').innerHTML = '<i class="fa fa-plus-circle text-primary mr-2"></i>新增设备';
          }
        });
      });
      
      document.getElementById('deviceForm').addEventListener('submit', handleDeviceFormSubmit);
      document.getElementById('cancelFormBtn').addEventListener('click', () => { showPage('devicesPage'); });
      document.getElementById('resetFormBtn').addEventListener('click', resetDeviceForm);
      document.getElementById('installationDate').addEventListener('change', calculateNextMaintenanceDate);
      document.getElementById('firstMaintenanceDate').addEventListener('change', calculateNextMaintenanceDate);
      document.getElementById('maintenanceCycle').addEventListener('change', calculateNextMaintenanceDate);
      document.getElementById('rentalPaymentCycle').addEventListener('change', calculateNextRentalDate);
      document.getElementById('nextRentalDueDate').addEventListener('change', calculateNextRentalDate);
      document.getElementById('searchInput').addEventListener('input', handleSearch);
      
      document.querySelectorAll('.home-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.home-filter-btn').forEach(b => { b.classList.remove('active','bg-primary','text-white'); b.classList.add('bg-gray-200','text-gray-700'); });
          btn.classList.add('active','bg-primary','text-white');
          btn.classList.remove('bg-gray-200','text-gray-700');
          homeFilter = btn.getAttribute('data-filter');
          renderTodoList();
        });
      });
      
      document.getElementById('prevPageBtn').addEventListener('click', () => { if(currentPageNum>1){ currentPageNum--; renderDevicesList(); } });
      document.getElementById('nextPageBtn').addEventListener('click', () => { if(currentPageNum < Math.ceil(filteredDevices.length/itemsPerPage)){ currentPageNum++; renderDevicesList(); } });
      document.getElementById('historyDeviceFilter').addEventListener('change', filterHistoryRecords);
      document.getElementById('historyTypeFilter').addEventListener('change', filterHistoryRecords);
      document.getElementById('historyDateRange').addEventListener('change', filterHistoryRecords);
      document.getElementById('historyPrevPageBtn').addEventListener('click', () => { if(currentHistoryPage>1){ currentHistoryPage--; renderHistoryRecords(); } });
      document.getElementById('historyNextPageBtn').addEventListener('click', () => { if(currentHistoryPage < Math.ceil(historyRecords.length/itemsPerHistoryPage)){ currentHistoryPage++; renderHistoryRecords(); } });
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('syncBtn').addEventListener('click', showSyncModal);
      document.getElementById('exportBtn').addEventListener('click', exportData);
      document.getElementById('backupBtn').addEventListener('click', backupData);
      document.getElementById('settingsBtn').addEventListener('click', showSettings);
      document.getElementById('importBtn').addEventListener('click', showImportModal);
      document.getElementById('addDeviceBtn').addEventListener('click', () => { resetDeviceForm(); showPage('deviceFormPage'); });
      document.getElementById('backToListBtn').addEventListener('click', () => { showPage('devicesPage'); });
      document.getElementById('addMaintenanceBtn').addEventListener('click', () => { showMaintenanceForm(currentDeviceId); });
      document.getElementById('addPaymentBtn').addEventListener('click', () => { showPaymentForm(currentDeviceId); });
    }

    // 合同归档切换
    function toggleContractArchive(deviceId) {
      const deviceIndex = devices.findIndex(d => d.id === deviceId);
      if (deviceIndex === -1) return;
      devices[deviceIndex].contractArchived = !devices[deviceIndex].contractArchived;
      devices[deviceIndex].updatedAt = new Date();
      if (saveData()) {
        showToast(devices[deviceIndex].contractArchived ? '合同已归档' : '已取消归档');
        if (currentPage === 'devicesPage') renderDevicesList();
        else if (currentPage === 'deviceDetailPage' && currentDeviceId === deviceId) showDeviceDetail(deviceId);
      }
    }

    // 显示同步模态框
    function showSyncModal() {
      showModal({
        title: '云端同步 (Supabase)',
        body: `
          <div class="space-y-6">
            <div class="bg-blue-50 p-4 rounded-lg text-sm text-blue-800">
              <p class="font-medium mb-1"><i class="fa fa-info-circle mr-1"></i> 系统现已开启自动同步</p>
              <p>正常情况下你无需手动操作。此处仅供网络异常后手动强制覆写数据使用。</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <button id="uploadToCloudBtn" class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-primary rounded-lg hover:bg-blue-50 transition group">
                <i class="fa fa-cloud-upload text-4xl text-primary mb-3 group-hover:scale-110 transition-transform"></i>
                <span class="font-medium text-lg">强制上传到云端</span>
                <span class="text-xs text-gray-500 mt-2 text-center">将本地数据覆盖到云端</span>
              </button>
              <button id="downloadFromCloudBtn" class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-green-500 rounded-lg hover:bg-green-50 transition group">
                <i class="fa fa-cloud-download text-4xl text-green-500 mb-3 group-hover:scale-110 transition-transform"></i>
                <span class="font-medium text-lg">强制从云端下载</span>
                <span class="text-xs text-gray-500 mt-2 text-center">用云端数据覆盖本地</span>
              </button>
            </div>
            <div id="syncStatus" class="text-center text-sm hidden py-2 rounded mt-4"></div>
          </div>
        `,
        footer: `<button id="closeSyncBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">关闭</button>`,
        onShow: () => {
          document.getElementById('closeSyncBtn').addEventListener('click', closeModal);
          document.getElementById('uploadToCloudBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('syncStatus');
            statusEl.className = 'text-center text-sm py-2 rounded bg-blue-100 text-blue-800 block mt-4';
            statusEl.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>正在强制上传到云端...';
            try {
              if (!supabaseClient) throw new Error('Supabase 客户端未初始化');
              const { error } = await supabaseClient.from('cloud_sync').upsert({ id: 'main_data', data: { devices, lastUpdated: new Date().toISOString() }, updated_at: new Date().toISOString() });
              if (error) throw error;
              statusEl.className = 'text-center text-sm py-2 rounded bg-green-100 text-green-800 block mt-4';
              statusEl.innerHTML = '<i class="fa fa-check-circle mr-2"></i>强制上传成功！';
              showToast('数据已成功强制上传到云端');
            } catch (err) {
              statusEl.className = 'text-center text-sm py-2 rounded bg-red-100 text-red-800 block mt-4';
              statusEl.innerHTML = '<i class="fa fa-times-circle mr-2"></i>上传失败: ' + err.message;
            }
          });
          document.getElementById('downloadFromCloudBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('syncStatus');
            statusEl.className = 'text-center text-sm py-2 rounded bg-blue-100 text-blue-800 block mt-4';
            statusEl.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>正在强制从云端下载...';
            try {
              if (!supabaseClient) throw new Error('Supabase 客户端未初始化');
              const { data, error } = await supabaseClient.from('cloud_sync').select('data').eq('id', 'main_data').single();
              if (error) {
                if (error.code === 'PGRST116') throw new Error('云端尚无数据，请先上传');
                throw error;
              }
              if (data && data.data && data.data.devices) {
                devices = data.data.devices;
                parseDeviceDates(devices);
                updateDevicesStatus();
                saveData(true);
                updateDeviceStats();
                if(currentPage === 'devicesPage') renderDevicesList();
                if(currentPage === 'homePage') { renderTodayReminders(); renderTodoList(); }
                if(currentPage === 'historyPage') renderHistoryFilters();
                statusEl.className = 'text-center text-sm py-2 rounded bg-green-100 text-green-800 block mt-4';
                statusEl.innerHTML = '<i class="fa fa-check-circle mr-2"></i>下载并覆盖本地成功！';
                showToast('已从云端强制恢复数据');
                setTimeout(() => closeModal(), 1500);
              } else {
                throw new Error('云端数据格式异常或不存在');
              }
            } catch (err) {
              statusEl.className = 'text-center text-sm py-2 rounded bg-red-100 text-red-800 block mt-4';
              statusEl.innerHTML = '<i class="fa fa-times-circle mr-2"></i>下载失败: ' + err.message;
            }
          });
        }
      });
    }
    
    // 显示页面
    function showPage(pageId) {
      document.querySelectorAll('#pageContent > div').forEach(page => page.classList.add('hidden'));
      document.getElementById(pageId).classList.remove('hidden');
      currentPage = pageId;
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.getAttribute('data-page') === pageId) {
          btn.classList.add('active', 'text-primary');
        } else {
          btn.classList.remove('active', 'text-primary');
        }
      });
      if (pageId === 'homePage') { updateDeviceStats(); renderTodayReminders(); renderTodoList(); }
      if (pageId === 'devicesPage') renderDevicesList();
      if (pageId === 'historyPage') filterHistoryRecords();  // 改为重新筛选，确保实时刷新
    }
    
    // 计算下次维保日期
    function calculateNextMaintenanceDate() {
      const firstMaintenanceDate = document.getElementById('firstMaintenanceDate').value;
      const maintenanceCycle = parseInt(document.getElementById('maintenanceCycle').value);
      if (firstMaintenanceDate) {
        const date = addMonthsSafely(new Date(firstMaintenanceDate), maintenanceCycle);
        document.getElementById('nextMaintenanceDate').value = date.toISOString().split('T')[0];
      }
    }
    
    function calculateNextRentalDate() {}
    
    function resetDeviceForm() {
      document.getElementById('deviceForm').reset();
      document.getElementById('deviceId').value = '';
      currentDeviceId = null;
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('installationDate').value = today;
      document.getElementById('firstMaintenanceDate').value = today;
      calculateNextMaintenanceDate();
    }
    
    function handleDeviceFormSubmit(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const deviceId = document.getElementById('deviceId').value;
      const device = {
        deviceNumber: formData.get('deviceNumber'),
        customerName: formData.get('customerName'),
        contactPhone: formData.get('contactPhone'),
        installationAddress: formData.get('installationAddress'),
        machineModel: formData.get('machineModel'),
        installationDate: new Date(formData.get('installationDate')),
        firstMaintenanceDate: new Date(formData.get('firstMaintenanceDate')),
        rentalPaymentCycle: parseInt(formData.get('rentalPaymentCycle')),
        nextRentalDueDate: new Date(formData.get('nextRentalDueDate')),
        maintenanceCycle: parseInt(formData.get('maintenanceCycle')),
        nextMaintenanceDate: new Date(formData.get('nextMaintenanceDate')),
        notes: formData.get('notes'),
        updatedAt: new Date()
      };
      if (deviceId) {
        const index = devices.findIndex(d => d.id === deviceId);
        if (index !== -1) {
          device.id = deviceId;
          device.createdAt = devices[index].createdAt;
          device.maintenanceRecords = devices[index].maintenanceRecords || [];
          device.paymentRecords = devices[index].paymentRecords || [];
          device.contractArchived = devices[index].contractArchived || false;
          devices[index] = device;
        }
      } else {
        device.id = generateId();
        device.createdAt = new Date();
        device.maintenanceRecords = [];
        device.paymentRecords = [];
        device.contractArchived = false;
        devices.push(device);
      }
      updateDevicesStatus();
      if (saveData()) {
        showToast(deviceId ? '设备更新成功' : '设备添加成功');
        updateDeviceStats();
        renderDevicesList();
        renderHistoryFilters();
        showPage('devicesPage');
      } else {
        showToast('保存失败，请重试', 'error');
      }
    }
    
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
    
    function updateDevicesStatus() {
      const today = new Date(); today.setHours(0,0,0,0);
      const threeDaysLater = new Date(); threeDaysLater.setDate(today.getDate()+3); threeDaysLater.setHours(0,0,0,0);
      devices.forEach(device => {
        const nm = new Date(device.nextMaintenanceDate); nm.setHours(0,0,0,0);
        const nr = new Date(device.nextRentalDueDate); nr.setHours(0,0,0,0);
        device.status = (nm < today || nr < today) ? 'expired' : ((nm <= threeDaysLater || nr <= threeDaysLater) ? 'warning' : 'normal');
      });
    }
    
    function updateDeviceStats() {
      document.getElementById('totalDevices').textContent = devices.length;
      document.getElementById('warningDevices').textContent = devices.filter(d=>d.status==='warning').length;
      document.getElementById('expiredDevices').textContent = devices.filter(d=>d.status==='expired').length;
    }
    
    function renderTodayReminders() {
      const today = new Date(); today.setHours(0,0,0,0);
      const tomorrow = new Date(); tomorrow.setDate(today.getDate()+1); tomorrow.setHours(0,0,0,0);
      const todayReminders = devices.filter(device => {
        const nm = new Date(device.nextMaintenanceDate); nm.setHours(0,0,0,0);
        const nr = new Date(device.nextRentalDueDate); nr.setHours(0,0,0,0);
        return (nm >= today && nm < tomorrow) || (nr >= today && nr < tomorrow);
      });
      const container = document.getElementById('todayReminders');
      if (!todayReminders.length) {
        container.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fa fa-check-circle text-4xl mb-3 text-green-500"></i><p>今日暂无待办事项</p></div>';
        return;
      }
      let html = '';
      todayReminders.forEach(device => {
        const nm = new Date(device.nextMaintenanceDate); nm.setHours(0,0,0,0);
        const nr = new Date(device.nextRentalDueDate); nr.setHours(0,0,0,0);
        const isM = nm >= today && nm < tomorrow;
        const isR = nr >= today && nr < tomorrow;
        html += `<div class="p-4 border border-gray-200 rounded-lg ${device.status==='expired'?'bg-red-50 border-red-200':device.status==='warning'?'bg-yellow-50 border-yellow-200':'bg-white'}">
          <div class="flex justify-between items-start"><div><h4 class="font-medium">${device.deviceNumber} - ${device.customerName}</h4><p class="text-sm text-gray-600 mt-1">${device.installationAddress}</p></div><span class="status-badge ${device.status==='expired'?'status-expired':device.status==='warning'?'status-warning':'status-normal'}">${device.status==='expired'?'已过期':device.status==='warning'?'即将到期':'正常'}</span></div>
          <div class="mt-3 flex flex-wrap gap-2">
            ${isM?'<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"><i class="fa fa-wrench mr-1"></i>今日需维保</span>':''}

    function renderTodoList() {

      todoDevices.sort((a,b) => Math.min(new Date(a.nextMaintenanceDate), new Date(a.nextRentalDueDate)) - Math.min(new Date(b.nextMaintenanceDate), new Date(b.nextRentalDueDate)));

        tbody.querySelectorAll('.view-device-btn').forEach(b => b.addEventListener('click', () => showDeviceDetail(b.dataset.id)));

    function handleSearch() { currentPageNum = 1; renderDevicesList(); }
    
    function editDevice(deviceId) {
      const device = devices.find(d => d.id === deviceId);
      if(!device) return;
      document.getElementById('deviceId').value = device.id;
      document.getElementById('deviceNumber').value = device.deviceNumber;
      document.getElementById('customerName').value = device.customerName;
      document.getElementById('contactPhone').value = device.contactPhone;
      document.getElementById('installationAddress').value = device.installationAddress;
      document.getElementById('machineModel').value = device.machineModel;
      document.getElementById('installationDate').value = device.installationDate.toISOString().split('T')[0];
      document.getElementById('firstMaintenanceDate').value = device.firstMaintenanceDate.toISOString().split('T')[0];
      document.getElementById('rentalPaymentCycle').value = device.rentalPaymentCycle;
      document.getElementById('nextRentalDueDate').value = device.nextRentalDueDate.toISOString().split('T')[0];
      document.getElementById('maintenanceCycle').value = device.maintenanceCycle;
      document.getElementById('nextMaintenanceDate').value = device.nextMaintenanceDate.toISOString().split('T')[0];

      showPage('deviceFormPage');

    function deleteDevice(deviceId) {
      const device = devices.find(d => d.id === deviceId);
      if(!device) return;
      showModal({
        title: '确认删除',
        body: `确定要删除设备 ${device.deviceNumber} - ${device.customerName} 吗？此操作不可撤销。`,
        footer: `<button id="cancelDeleteBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">取消</button><button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">确认删除</button>`,
        onShow: () => {
          document.getElementById('cancelDeleteBtn').addEventListener('click', closeModal);
          document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            devices = devices.filter(d => d.id !== deviceId);
            if(saveData()) {
              showToast('设备已删除');
              updateDeviceStats();
              renderDevicesList();
              renderHistoryFilters();
              renderTodayReminders();
              renderTodoList();

              showToast('删除失败，请重试', 'error');

          <button id="toggleArchiveDetailBtn" class="px-4 py-2 ${device.contractArchived?'bg-gray-100 text-gray-700 hover:bg-gray-200':'bg-blue-50 text-blue-700 hover:bg-blue-100'} border ${device.contractArchived?'border-gray-200':'border-blue-200'} rounded-lg transition"><i class="fa ${device.contractArchived?'fa-folder-open-o':'fa-folder'} mr-1"></i>${device.contractArchived?'取消归档':'标记已归档'}</button>
          <button id="editDeviceDetailBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition"><i class="fa fa-pencil mr-1"></i>编辑设备</button>

    function renderPaymentRecords(deviceId) {

          <div class="flex justify-between items-start"><div><div class="font-medium">${r.paymentPeriod||'租金'}</div><div class="text-sm text-gray-600 mt-1">缴费方式: ${r.paymentMethod||'未知'}</div></div><div class="text-right"><div class="font-medium text-green-600">¥${r.paymentAmount.toFixed(2)}</div><div class="text-sm text-gray-500">${formatDate(r.paymentDate)}</div></div></div>
          ${r.notes?`<div class="mt-2 text-sm">${r.notes}</div>`:''}
        </div>
      `).join('');

    function renderHistoryFilters() {
      const sel = document.getElementById('historyDeviceFilter');
      sel.innerHTML = '<option value="all">全部设备</option>';
      devices.forEach(d => sel.innerHTML += `<option value="${d.id}">${d.deviceNumber} - ${d.customerName}</option>`);
      filterHistoryRecords();
    }
    
    function filterHistoryRecords() {
      const deviceId = document.getElementById('historyDeviceFilter').value;
      const type = document.getElementById('historyTypeFilter').value;
      const range = parseInt(document.getElementById('historyDateRange').value);
      let startDate = null;
      if(!isNaN(range)) { startDate = new Date(); startDate.setDate(startDate.getDate() - range); }
      let all = [];
      devices.forEach(device => {
        if(deviceId !== 'all' && device.id !== deviceId) return;
        if(type !== 'payment' && device.maintenanceRecords) {
          device.maintenanceRecords.forEach(r => {
            if(startDate && new Date(r.maintenanceDate) < startDate) return;
            all.push({
              id: r.id, deviceId: device.id, deviceNumber: device.deviceNumber, customerName: device.customerName,
              date: new Date(r.maintenanceDate), type: 'maintenance', typeName: r.maintenanceType||'常规维保',
              details: `维保人员: ${r.maintenancePerson||'未知'}`, notes: r.notes, operator: r.maintenancePerson||'未知', recordId: r.id
            });
          });
        }
        if(type !== 'maintenance' && device.paymentRecords) {
          device.paymentRecords.forEach(r => {
            if(startDate && new Date(r.paymentDate) < startDate) return;
            all.push({
              id: r.id, deviceId: device.id, deviceNumber: device.deviceNumber, customerName: device.customerName,
              date: new Date(r.paymentDate), type: 'payment', typeName: '租金缴纳',
              details: `金额: ¥${r.paymentAmount.toFixed(2)}`, notes: r.notes, operator: '系统', recordId: r.id
            });
          });
        }
      });
      historyRecords = all.sort((a,b)=>b.date-a.date);
      currentHistoryPage = 1;
      renderHistoryRecords();
    }
    
    function renderHistoryRecords() {
      const start = (currentHistoryPage-1)*itemsPerHistoryPage;
      const paginated = historyRecords.slice(start, start+itemsPerHistoryPage);
      const tbody = document.getElementById('historyTableBody');
      if(!paginated.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-gray-500"><i class="fa fa-history text-2xl mb-2"></i><p>暂无历史记录</p></td></tr>';
      } else {
        tbody.innerHTML = paginated.map(rec => `<tr class="hover:bg-gray-50">
          <td class="px-6 py-4 whitespace-nowrap">${formatDate(rec.date)}</td>
          <td class="px-6 py-4 whitespace-nowrap"><div class="font-medium">${rec.deviceNumber}</div></td>
          <td class="px-6 py-4 whitespace-nowrap">${rec.customerName}</td>
          <td class="px-6 py-4 whitespace-nowrap"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${rec.type==='maintenance'?'bg-blue-100 text-blue-800':'bg-green-100 text-green-800'}">${rec.typeName}</span></td>
          <td class="px-6 py-4"><div class="text-sm">${rec.details}</div>${rec.notes?`<div class="text-xs text-gray-500 mt-1">${rec.notes}</div>`:''}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm">${rec.operator}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <button class="edit-history-btn text-primary hover:text-blue-700 mr-2" data-device-id="${rec.deviceId}" data-type="${rec.type}" data-record-id="${rec.recordId}"><i class="fa fa-pencil"></i></button>
            <button class="delete-history-btn text-red-600 hover:text-red-800" data-device-id="${rec.deviceId}" data-type="${rec.type}" data-record-id="${rec.recordId}"><i class="fa fa-trash"></i></button>
          </td>
        </tr>`).join('');
        tbody.querySelectorAll('.edit-history-btn').forEach(b => b.addEventListener('click', () => editHistoryRecord(b.dataset.deviceId, b.dataset.type, b.dataset.recordId)));
        tbody.querySelectorAll('.delete-history-btn').forEach(b => b.addEventListener('click', () => deleteHistoryRecord(b.dataset.deviceId, b.dataset.type, b.dataset.recordId)));
      }
      document.getElementById('historyShowingRange').textContent = `${start+1}-${Math.min(start+itemsPerHistoryPage, historyRecords.length)}`;
      document.getElementById('historyTotalItems').textContent = historyRecords.length;
      document.getElementById('historyPrevPageBtn').disabled = currentHistoryPage === 1;
      document.getElementById('historyNextPageBtn').disabled = start+itemsPerHistoryPage >= historyRecords.length;
    }
    
    // 编辑历史记录
    function editHistoryRecord(deviceId, type, recordId) {
      const device = devices.find(d => d.id === deviceId);
      if(!device) return;
      const record = (type==='maintenance' ? device.maintenanceRecords : device.paymentRecords).find(r => r.id === recordId);
      if(!record) return;
      const saveCallback = () => {
        const fd = new FormData(document.getElementById('editForm'));
        if (type === 'maintenance') {
          const p = fd.get('p');
          if (!p || !p.trim()) { showToast('维保人不能为空', 'error'); return; }
          record.maintenanceDate = new Date(fd.get('d'));
          record.maintenanceType = fd.get('t');
          record.maintenancePerson = p.trim();
          record.notes = fd.get('n') || '';
          recalculateNextMaintenanceDate(device);
        } else {
          record.paymentDate = new Date(fd.get('d'));
          record.paymentAmount = parseFloat(fd.get('a'));
          record.paymentPeriod = fd.get('per');
          record.paymentMethod = fd.get('m');
          record.notes = fd.get('n') || '';
          recalculateNextRentalDueDate(device);
        }
        device.updatedAt = new Date();
        updateDevicesStatus();
        saveData();
        filterHistoryRecords();
        refreshAllViews();
        closeModal();
        showToast(`${type==='maintenance'?'维保':'缴费'}记录已更新`);
      };
      if(type === 'maintenance') {
        showModal({
          title: '编辑维保记录',
          body: `<form id="editForm" class="space-y-4">
            <div><label>日期</label><input type="date" name="d" value="${record.maintenanceDate.toISOString().split('T')[0]}" required class="w-full border rounded px-4 py-2"></div>
            <div><label>类型</label><select name="t" class="w-full border rounded px-4 py-2">${['常规维保','滤芯更换','故障维修','设备升级','其他'].map(o=>`<option ${record.maintenanceType===o?'selected':''}>${o}</option>`).join('')}</select></div>
            <div><label>维保人</label><input type="text" name="p" value="${record.maintenancePerson||''}" required class="w-full border rounded px-4 py-2"></div>
            <div><label>备注</label><textarea name="n" rows="3" class="w-full border rounded px-4 py-2">${record.notes||''}</textarea></div>
          </form>`,
          footer: `<button id="cancelEditBtn" class="px-4 py-2 bg-gray-200 rounded">取消</button><button id="saveEditBtn" class="px-4 py-2 bg-primary text-white rounded">保存</button>`,

    function exportData() {

      const data = devices.map(device => {
        const md = Math.ceil((new Date(device.nextMaintenanceDate)-new Date())/86400000);
        const rd = Math.ceil((new Date(device.nextRentalDueDate)-new Date())/86400000);
        return {
          '设备编号': device.deviceNumber, '客户姓名': device.customerName, '联系电话': device.contactPhone,
          '安装详细地址': device.installationAddress, '机器型号': device.machineModel,

    function showModal(opt) {

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function formatDate(date, fmt='YYYY-MM-DD') {
      if(!date) return '';
      const d = new Date(date);
      return fmt.replace('YYYY', d.getFullYear()).replace('MM', String(d.getMonth()+1).padStart(2,'0')).replace('DD', String(d.getDate()).padStart(2,'0')).replace('HH', String(d.getHours()).padStart(2,'0')).replace('mm', String(d.getMinutes()).padStart(2,'0')).replace('ss', String(d.getSeconds()).padStart(2,'0'));
    }
    function showToast(message, type='success') {
      const toast = document.createElement('div');
      toast.className = `fixed top-4 right-4 px-4 py-2 rounded-lg shadow-lg z-50 flex items-center ${type==='success'?'bg-green-500 text-white':type==='error'?'bg-red-500 text-white':type==='warning'?'bg-yellow-500 text-white':'bg-blue-500 text-white'}`;
      toast.innerHTML = `<i class="fa ${type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':type==='warning'?'fa-exclamation-triangle':'fa-info-circle'} mr-2"></i>${message}`;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity='0'; toast.style.transform='translateY(-20px)'; setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    function checkTodayReminders() {
      const today = new Date(); today.setHours(0,0,0,0);
      const tomorrow = new Date(); tomorrow.setDate(today.getDate()+1); tomorrow.setHours(0,0,0,0);
      const todayReminders = devices.filter(device => {
        const nm = new Date(device.nextMaintenanceDate); nm.setHours(0,0,0,0);
        const nr = new Date(device.nextRentalDueDate); nr.setHours(0,0,0,0);
        return (nm >= today && nm < tomorrow) || (nr >= today && nr < tomorrow);
      });
      if(todayReminders.length) {
        setTimeout(() => {
          showModal({
            title: '今日提醒',
            body: `<div class="space-y-4"><p class="text-center">今天有 ${todayReminders.length} 项待办事项需要处理：</p><div class="space-y-3">${todayReminders.map(device => {
              const nm = new Date(device.nextMaintenanceDate); nm.setHours(0,0,0,0);
              const nr = new Date(device.nextRentalDueDate); nr.setHours(0,0,0,0);
              const isM = nm >= today && nm < tomorrow;
              const isR = nr >= today && nr < tomorrow;
              return `<div class="p-3 border border-gray-200 rounded-lg"><div class="font-medium">${device.deviceNumber} - ${device.customerName}</div><div class="text-sm text-gray-600 mt-1">${device.installationAddress}</div><div class="mt-2 flex flex-wrap gap-2">${isM?'<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"><i class="fa fa-wrench mr-1"></i>今日需维保</span>':''}${isR?'<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800"><i class="fa fa-money mr-1"></i>今日需收租</span>':''}</div></div>`;
            }).join('')}</div></div>`,
            footer: `<button id="viewTodayRemindersBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition">查看详情</button><button id="dismissRemindersBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">稍后处理</button>`,
            onShow: () => {
              document.getElementById('viewTodayRemindersBtn').addEventListener('click', () => { closeModal(); showPage('homePage'); });
              document.getElementById('dismissRemindersBtn').addEventListener('click', closeModal);
            }
          });
        }, 1000);
      }
    }
  </script>
</body>
</html>
