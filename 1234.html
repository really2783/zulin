<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>净水管理系统</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.header{background:#1976d2;color:#fff;padding:15px;text-align:center;font-size:18px}
.card{background:#fff;margin:10px;padding:15px;border-radius:10px}
.red{color:red}
.orange{color:orange}
.green{color:green}
button{margin-top:5px;padding:6px 10px}
input{margin:5px 0;padding:6px;width:100%}
</style>
</head>

<body>

<div class="header">净水维保管理</div>

<div class="card">
<h3>📌 今日待办</h3>
<div id="todo"></div>
</div>

<div id="list"></div>

<div class="card">
<h3>➕ 新增设备</h3>
<input id="name" placeholder="客户姓名">
<input id="phone" placeholder="电话">
<input id="cycle" placeholder="维保周期（月）默认3">
<input id="rent" placeholder="租金周期（月）默认1">
<button onclick="add()">添加</button>
</div>

<script>
let devices = JSON.parse(localStorage.getItem('devices')||'[]');

function save(){
 localStorage.setItem('devices',JSON.stringify(devices));
}

function nextDate(date, m){
 let d=new Date(date);
 d.setMonth(d.getMonth()+m);
 return d;
}

function status(date){
 let diff=(date-new Date())/86400000;
 if(diff<0) return 'red';
 if(diff<=3) return 'orange';
 return 'green';
}

function render(){
 let list='',todo='';

 devices.forEach((d,i)=>{
  let sDate=new Date(d.nextService);
  let rDate=new Date(d.nextRent);

  let s=status(sDate);
  let r=status(rDate);

  if(s!='green' || r!='green'){
    todo+=`${d.id} ${d.name}<br>`;
  }

  list+=`
  <div class="card">
    <b>${d.id} ${d.name}</b><br>
    维保：<span class="${s}">${sDate.toLocaleDateString()}</span><br>
    租金：<span class="${r}">${rDate.toLocaleDateString()}</span><br>
    <button onclick="service(${i})">完成维保</button>
    <button onclick="rent(${i})">完成收租</button>
  </div>`;
 });

 document.getElementById('list').innerHTML=list;
 document.getElementById('todo').innerHTML=todo||'无';
}

function add(){
 let name=document.getElementById('name').value;
 let phone=document.getElementById('phone').value;
 let cycle=parseInt(document.getElementById('cycle').value)||3;
 let rentCycle=parseInt(document.getElementById('rent').value)||1;

 let id='JW-'+String(devices.length+1).padStart(4,'0');
 let now=new Date();

 devices.push({
   id,name,phone,
   lastService:now,
   nextService:nextDate(now,cycle),
   nextRent:nextDate(now,rentCycle),
   cycle,rentCycle
 });

 save();render();
}

function service(i){
 let now=new Date();
 devices[i].lastService=now;
 devices[i].nextService=nextDate(now,devices[i].cycle);
 save();render();
}

function rent(i){
 let now=new Date();
 devices[i].nextRent=nextDate(now,devices[i].rentCycle);
 save();render();
}

render();
</script>

</body>
</html>
